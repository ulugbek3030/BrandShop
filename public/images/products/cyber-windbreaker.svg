<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#191925"/>
      <stop offset="100%" stop-color="#131313"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <!-- Diagonal rain/line effect -->
  <g stroke="#bf81ff" stroke-width="0.8" opacity="0.1">
    <line x1="50" y1="0" x2="150" y2="1000"/>
    <line x1="150" y1="0" x2="250" y2="1000"/>
    <line x1="250" y1="0" x2="350" y2="1000"/>
    <line x1="350" y1="0" x2="450" y2="1000"/>
    <line x1="450" y1="0" x2="550" y2="1000"/>
    <line x1="550" y1="0" x2="650" y2="1000"/>
    <line x1="650" y1="0" x2="750" y2="1000"/>
  </g>
  <!-- Shorter rain streaks -->
  <g stroke="#bf81ff" stroke-width="0.5" opacity="0.15">
    <line x1="120" y1="100" x2="145" y2="350"/>
    <line x1="320" y1="50" x2="355" y2="380"/>
    <line x1="520" y1="150" x2="548" y2="420"/>
    <line x1="680" y1="200" x2="705" y2="450"/>
    <line x1="200" y1="500" x2="225" y2="750"/>
    <line x1="420" y1="550" x2="448" y2="820"/>
    <line x1="600" y1="480" x2="625" y2="730"/>
  </g>
  <!-- Windbreaker collar shape -->
  <path d="M300,380 L350,360 Q400,350 450,360 L500,380" fill="none" stroke="#bf81ff" stroke-width="1" opacity="0.2"/>
  <!-- Zipper -->
  <line x1="400" y1="380" x2="400" y2="700" stroke="#bf81ff" stroke-width="1" opacity="0.12" stroke-dasharray="6,4"/>
  <!-- Hood outline -->
  <path d="M300,380 Q280,330 310,280 Q400,240 490,280 Q520,330 500,380" fill="none" stroke="#bf81ff" stroke-width="0.8" opacity="0.12"/>
  <!-- Product name -->
  <text x="400" y="490" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="6">CYBER</text>
  <text x="400" y="545" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#bf81ff" letter-spacing="10">WINDBREAKER</text>
  <text x="400" y="900" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#555" letter-spacing="8">CLICK.UZ</text>
</svg>