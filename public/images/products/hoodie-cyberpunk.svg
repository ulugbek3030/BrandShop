<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2a1045"/>
      <stop offset="100%" stop-color="#131313"/>
    </radialGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bf81ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#131313" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#glow)"/>
  <!-- Circuit lines -->
  <line x1="100" y1="200" x2="400" y2="200" stroke="#bf81ff" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="200" x2="400" y2="500" stroke="#bf81ff" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="500" x2="700" y2="500" stroke="#bf81ff" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="350" x2="600" y2="350" stroke="#bf81ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="300" y1="100" x2="300" y2="600" stroke="#bf81ff" stroke-width="0.5" opacity="0.15"/>
  <line x1="500" y1="150" x2="500" y2="700" stroke="#bf81ff" stroke-width="0.5" opacity="0.15"/>
  <line x1="150" y1="600" x2="650" y2="600" stroke="#bf81ff" stroke-width="0.5" opacity="0.2"/>
  <!-- Circuit nodes -->
  <circle cx="400" cy="200" r="4" fill="#bf81ff" opacity="0.5"/>
  <circle cx="400" cy="500" r="4" fill="#bf81ff" opacity="0.5"/>
  <circle cx="300" cy="350" r="3" fill="#bf81ff" opacity="0.4"/>
  <circle cx="500" cy="350" r="3" fill="#bf81ff" opacity="0.4"/>
  <circle cx="100" cy="200" r="3" fill="#bf81ff" opacity="0.3"/>
  <circle cx="700" cy="500" r="3" fill="#bf81ff" opacity="0.3"/>
  <!-- Geometric shapes -->
  <rect x="250" y="300" width="80" height="80" rx="4" fill="none" stroke="#bf81ff" stroke-width="1" opacity="0.2" transform="rotate(45 290 340)"/>
  <rect x="470" y="400" width="60" height="60" rx="4" fill="none" stroke="#bf81ff" stroke-width="1" opacity="0.15" transform="rotate(30 500 430)"/>
  <!-- Product name -->
  <text x="400" y="480" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="6">ХУДИ</text>
  <text x="400" y="535" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="300" fill="#bf81ff" letter-spacing="10">CYBERPUNK V2</text>
  <!-- Brand -->
  <text x="400" y="900" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#555" letter-spacing="8">CLICK.UZ</text>
</svg>