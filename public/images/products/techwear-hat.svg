<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#131313"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <!-- Crosshatch pattern -->
  <g stroke="#3a3a3a" stroke-width="0.4" opacity="0.25">
    <line x1="100" y1="100" x2="700" y2="700"/>
    <line x1="200" y1="100" x2="800" y2="700"/>
    <line x1="0" y1="100" x2="600" y2="700"/>
    <line x1="0" y1="250" x2="450" y2="700"/>
    <line x1="300" y1="100" x2="800" y2="600"/>
    <line x1="0" y1="400" x2="300" y2="700"/>
    <line x1="500" y1="100" x2="800" y2="400"/>
    <!-- Reverse direction -->
    <line x1="700" y1="100" x2="100" y2="700"/>
    <line x1="600" y1="100" x2="0" y2="700"/>
    <line x1="800" y1="100" x2="200" y2="700"/>
    <line x1="800" y1="250" x2="350" y2="700"/>
    <line x1="500" y1="100" x2="0" y2="600"/>
    <line x1="800" y1="400" x2="500" y2="700"/>
    <line x1="300" y1="100" x2="0" y2="400"/>
  </g>
  <!-- Panama hat outline -->
  <ellipse cx="400" cy="460" rx="180" ry="50" fill="none" stroke="#e9ffb9" stroke-width="1" opacity="0.15"/>
  <path d="M220,460 Q220,350 400,320 Q580,350 580,460" fill="none" stroke="#e9ffb9" stroke-width="1" opacity="0.12"/>
  <!-- Brim -->
  <ellipse cx="400" cy="460" rx="230" ry="65" fill="none" stroke="#e9ffb9" stroke-width="0.8" opacity="0.1"/>
  <!-- Hat band -->
  <line x1="225" y1="445" x2="575" y2="445" stroke="#e9ffb9" stroke-width="0.8" opacity="0.15" stroke-dasharray="0"/>
  <line x1="225" y1="455" x2="575" y2="455" stroke="#e9ffb9" stroke-width="0.8" opacity="0.15"/>
  <!-- Product name -->
  <text x="400" y="480" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="4">ПАНАМА</text>
  <text x="400" y="535" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#e9ffb9" letter-spacing="12">TECHWEAR</text>
  <text x="400" y="900" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#555" letter-spacing="8">CLICK.UZ</text>
</svg>