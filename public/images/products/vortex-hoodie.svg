<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0f1a2a"/>
      <stop offset="100%" stop-color="#131313"/>
    </radialGradient>
    <filter id="elglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <!-- Electric blue circuit pattern -->
  <line x1="100" y1="180" x2="350" y2="180" stroke="#2e8bff" stroke-width="1" opacity="0.2"/>
  <line x1="350" y1="180" x2="350" y2="350" stroke="#2e8bff" stroke-width="1" opacity="0.2"/>
  <line x1="350" y1="350" x2="550" y2="350" stroke="#2e8bff" stroke-width="1" opacity="0.2"/>
  <line x1="550" y1="350" x2="550" y2="550" stroke="#2e8bff" stroke-width="1" opacity="0.2"/>
  <line x1="550" y1="550" x2="700" y2="550" stroke="#2e8bff" stroke-width="1" opacity="0.2"/>
  <line x1="450" y1="250" x2="650" y2="250" stroke="#2e8bff" stroke-width="0.5" opacity="0.15"/>
  <line x1="650" y1="250" x2="650" y2="450" stroke="#2e8bff" stroke-width="0.5" opacity="0.15"/>
  <line x1="150" y1="400" x2="250" y2="400" stroke="#2e8bff" stroke-width="0.5" opacity="0.15"/>
  <line x1="250" y1="400" x2="250" y2="600" stroke="#2e8bff" stroke-width="0.5" opacity="0.15"/>
  <!-- Circuit nodes -->
  <circle cx="350" cy="180" r="4" fill="#2e8bff" opacity="0.4" filter="url(#elglow)"/>
  <circle cx="350" cy="350" r="4" fill="#2e8bff" opacity="0.4" filter="url(#elglow)"/>
  <circle cx="550" cy="350" r="4" fill="#2e8bff" opacity="0.4" filter="url(#elglow)"/>
  <circle cx="550" cy="550" r="4" fill="#2e8bff" opacity="0.4" filter="url(#elglow)"/>
  <circle cx="250" cy="400" r="3" fill="#2e8bff" opacity="0.3"/>
  <circle cx="650" cy="250" r="3" fill="#2e8bff" opacity="0.3"/>
  <!-- Lime accent elements -->
  <circle cx="400" cy="430" r="60" fill="none" stroke="#e9ffb9" stroke-width="1" opacity="0.1"/>
  <circle cx="400" cy="430" r="40" fill="none" stroke="#e9ffb9" stroke-width="0.5" opacity="0.08"/>
  <line x1="340" y1="430" x2="460" y2="430" stroke="#e9ffb9" stroke-width="0.5" opacity="0.15"/>
  <line x1="400" y1="370" x2="400" y2="490" stroke="#e9ffb9" stroke-width="0.5" opacity="0.15"/>
  <!-- Product name -->
  <text x="400" y="470" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="4">VORTEX TECH</text>
  <text x="400" y="525" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="300" fill="#2e8bff" letter-spacing="10">ХУДИ</text>
  <text x="400" y="900" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#555" letter-spacing="8">CLICK.UZ</text>
</svg>