<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#141828"/>
      <stop offset="100%" stop-color="#131313"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e2d5a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#131313" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#navy)"/>
  <!-- Cap outline -->
  <path d="M250,450 Q400,350 550,450" fill="none" stroke="#3a5aa8" stroke-width="1.5" opacity="0.3"/>
  <path d="M250,450 L230,480 Q400,520 570,480 L550,450" fill="none" stroke="#3a5aa8" stroke-width="1" opacity="0.2"/>
  <line x1="230" y1="480" x2="570" y2="480" stroke="#3a5aa8" stroke-width="1" opacity="0.25"/>
  <!-- Brim -->
  <path d="M230,480 Q180,510 220,530 L580,530 Q620,510 570,480" fill="none" stroke="#3a5aa8" stroke-width="1" opacity="0.2"/>
  <!-- Decorative elements -->
  <circle cx="400" cy="420" r="30" fill="none" stroke="#3a5aa8" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="420" r="15" fill="none" stroke="#3a5aa8" stroke-width="0.5" opacity="0.15"/>
  <!-- Stitching accents -->
  <line x1="250" y1="400" x2="350" y2="400" stroke="#3a5aa8" stroke-width="0.5" opacity="0.2" stroke-dasharray="3,3"/>
  <line x1="450" y1="400" x2="550" y2="400" stroke="#3a5aa8" stroke-width="0.5" opacity="0.2" stroke-dasharray="3,3"/>
  <!-- Corner accents -->
  <rect x="100" y="200" width="40" height="40" rx="2" fill="none" stroke="#3a5aa8" stroke-width="0.5" opacity="0.1"/>
  <rect x="660" y="200" width="40" height="40" rx="2" fill="none" stroke="#3a5aa8" stroke-width="0.5" opacity="0.1"/>
  <!-- Product name -->
  <text x="400" y="480" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="6">КЕПКА</text>
  <text x="400" y="540" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="300" fill="#6b8fd4" letter-spacing="14">LOGO</text>
  <text x="400" y="900" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#555" letter-spacing="8">CLICK.UZ</text>
</svg>