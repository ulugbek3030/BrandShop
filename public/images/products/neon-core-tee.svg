<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#131313"/>
    </radialGradient>
    <filter id="numglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <!-- Glowing number "1" center -->
  <text x="400" y="520" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="300" font-weight="900" fill="#e9ffb9" opacity="0.06" filter="url(#numglow)">1</text>
  <text x="400" y="520" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="300" font-weight="900" fill="#e9ffb9" opacity="0.04">1</text>
  <!-- Concentric rings around the 1 -->
  <circle cx="400" cy="430" r="120" fill="none" stroke="#e9ffb9" stroke-width="0.8" opacity="0.08"/>
  <circle cx="400" cy="430" r="180" fill="none" stroke="#e9ffb9" stroke-width="0.5" opacity="0.05"/>
  <circle cx="400" cy="430" r="240" fill="none" stroke="#e9ffb9" stroke-width="0.3" opacity="0.03"/>
  <!-- Corner marks -->
  <path d="M120,150 L120,120 L150,120" fill="none" stroke="#e9ffb9" stroke-width="1" opacity="0.15"/>
  <path d="M680,150 L680,120 L650,120" fill="none" stroke="#e9ffb9" stroke-width="1" opacity="0.15"/>
  <path d="M120,850 L120,880 L150,880" fill="none" stroke="#e9ffb9" stroke-width="1" opacity="0.15"/>
  <path d="M680,850 L680,880 L650,880" fill="none" stroke="#e9ffb9" stroke-width="1" opacity="0.15"/>
  <!-- Product name -->
  <text x="400" y="470" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="6">NEON CORE</text>
  <text x="400" y="525" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="300" fill="#e9ffb9" letter-spacing="14">TEE</text>
  <text x="400" y="900" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#555" letter-spacing="8">CLICK.UZ</text>
</svg>