<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171717"/>
      <stop offset="100%" stop-color="#131313"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g stroke="#2a2a2a" stroke-width="0.5" opacity="0.3">
    <line x1="100" y1="100" x2="100" y2="900"/><line x1="200" y1="100" x2="200" y2="900"/>
    <line x1="300" y1="100" x2="300" y2="900"/><line x1="400" y1="100" x2="400" y2="900"/>
    <line x1="500" y1="100" x2="500" y2="900"/><line x1="600" y1="100" x2="600" y2="900"/>
    <line x1="700" y1="100" x2="700" y2="900"/>
    <line x1="100" y1="100" x2="700" y2="100"/><line x1="100" y1="200" x2="700" y2="200"/>
    <line x1="100" y1="300" x2="700" y2="300"/><line x1="100" y1="400" x2="700" y2="400"/>
    <line x1="100" y1="500" x2="700" y2="500"/><line x1="100" y1="600" x2="700" y2="600"/>
    <line x1="100" y1="700" x2="700" y2="700"/><line x1="100" y1="800" x2="700" y2="800"/>
    <line x1="100" y1="900" x2="700" y2="900"/>
  </g>
  <!-- Highlighted grid cells -->
  <rect x="300" y="300" width="100" height="100" fill="#e9ffb9" opacity="0.03"/>
  <rect x="400" y="400" width="100" height="100" fill="#e9ffb9" opacity="0.03"/>
  <rect x="300" y="500" width="100" height="100" fill="#e9ffb9" opacity="0.02"/>
  <rect x="400" y="300" width="100" height="100" fill="#e9ffb9" opacity="0.02"/>
  <!-- Tote outline -->
  <path d="M280,350 L280,650 Q280,680 310,680 L490,680 Q520,680 520,650 L520,350" fill="none" stroke="#e9ffb9" stroke-width="1" opacity="0.15"/>
  <path d="M320,350 Q320,300 400,300 Q480,300 480,350" fill="none" stroke="#e9ffb9" stroke-width="1" opacity="0.12"/>
  <!-- Product name -->
  <text x="400" y="490" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="4">UTILITY</text>
  <text x="400" y="540" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#e9ffb9" letter-spacing="10">TECH TOTE</text>
  <text x="400" y="900" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#555" letter-spacing="8">CLICK.UZ</text>
</svg>