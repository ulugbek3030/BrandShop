<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#181a16"/>
      <stop offset="100%" stop-color="#131313"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <!-- Utility pocket outlines -->
  <rect x="180" y="300" width="140" height="110" rx="6" fill="none" stroke="#7a8a5a" stroke-width="1" opacity="0.2"/>
  <rect x="480" y="320" width="140" height="110" rx="6" fill="none" stroke="#7a8a5a" stroke-width="1" opacity="0.18"/>
  <rect x="220" y="550" width="100" height="80" rx="4" fill="none" stroke="#7a8a5a" stroke-width="0.8" opacity="0.15"/>
  <rect x="480" y="570" width="100" height="80" rx="4" fill="none" stroke="#7a8a5a" stroke-width="0.8" opacity="0.13"/>
  <!-- Pocket flaps -->
  <line x1="180" y1="340" x2="320" y2="340" stroke="#7a8a5a" stroke-width="0.8" opacity="0.2"/>
  <line x1="480" y1="360" x2="620" y2="360" stroke="#7a8a5a" stroke-width="0.8" opacity="0.18"/>
  <!-- Snap buttons on pockets -->
  <circle cx="250" cy="330" r="4" fill="none" stroke="#7a8a5a" stroke-width="0.8" opacity="0.25"/>
  <circle cx="550" cy="350" r="4" fill="none" stroke="#7a8a5a" stroke-width="0.8" opacity="0.22"/>
  <!-- Stitch lines -->
  <line x1="200" y1="440" x2="200" y2="520" stroke="#7a8a5a" stroke-width="0.5" opacity="0.15" stroke-dasharray="3,3"/>
  <line x1="600" y1="460" x2="600" y2="540" stroke="#7a8a5a" stroke-width="0.5" opacity="0.15" stroke-dasharray="3,3"/>
  <!-- Belt loops -->
  <rect x="280" y="230" width="12" height="35" rx="2" fill="none" stroke="#7a8a5a" stroke-width="0.6" opacity="0.15"/>
  <rect x="380" y="230" width="12" height="35" rx="2" fill="none" stroke="#7a8a5a" stroke-width="0.6" opacity="0.15"/>
  <rect x="510" y="230" width="12" height="35" rx="2" fill="none" stroke="#7a8a5a" stroke-width="0.6" opacity="0.15"/>
  <!-- Waistband -->
  <line x1="200" y1="250" x2="600" y2="250" stroke="#7a8a5a" stroke-width="0.8" opacity="0.2"/>
  <!-- Product name -->
  <text x="400" y="475" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="4">БРЮКИ</text>
  <text x="400" y="530" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="300" fill="#c4d89a" letter-spacing="14">CARGO</text>
  <text x="400" y="900" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#555" letter-spacing="8">CLICK.UZ</text>
</svg>